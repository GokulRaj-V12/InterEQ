<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterEQ – MFA Automation Platform</title>
  <meta name="description" content="InterEQ — Intelligent MFA automation for seamless, secure authentication."/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { background: #F3F6FB; }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .hero-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
    .hero-logo .logo-icon { width: 64px; height: 64px; }
    .hero-logo .logo-text { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
    .hero-tag {
      display: inline-block;
      background: #EFF6FF; border: 1px solid #BFDBFE;
      color: #2563EB; border-radius: 20px;
      padding: 5px 16px; font-size: 13px; font-weight: 600;
      margin-bottom: 18px;
    }
    .hero-title { font-size: 36px; font-weight: 800; line-height: 1.2; margin-bottom: 16px; color: var(--text-dark); }
    .hero-sub   { font-size: 16px; color: var(--text-muted); max-width: 480px; margin: 0 auto 32px; line-height: 1.7; }
    .hero-cta   { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .footer-index {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      padding: 12px 32px;
      display: flex; justify-content: center;
      font-size: 12px; color: var(--text-muted); gap: 24px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-logo">
      <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="logo-text">InterEQ</div>
    </div>
    <span class="hero-tag">🤖 MFA Automation Demo</span>
    <h1 class="hero-title">Intelligent Authentication,<br/>Automated.</h1>
    <p class="hero-sub">
      Experience how InterEQ's agent handles multi-factor authentication end-to-end —
      credentials to code, hands-free.
    </p>
    <div class="hero-cta">
      <a href="login.html" class="btn-primary" style="text-decoration:none; padding:12px 28px; font-size:15px;">
        Start Demo →
      </a>
      <a href="dashboard.html" class="btn-secondary" style="text-decoration:none; padding:11px 28px; font-size:15px;">
        View Dashboard
      </a>
    </div>
  </div>
  <footer class="footer-index">
    <span>© 2025 InterEQ</span>
    <a href="#">Privacy Policy</a>
    <a href="https://github.com/GokulRaj-V12/InterEQ" target="_blank">GitHub</a>
  </footer>
<script src="js/main.js"></script>
</body>
</html>
