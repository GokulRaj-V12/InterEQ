<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterEQ – Sign In</title>
  <meta name="description" content="Sign in to your InterEQ account to access your dashboard."/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div class="split-layout">

  <!-- LEFT DECORATIVE PANEL -->
  <div class="left-panel" role="presentation" aria-hidden="true">
    <div class="arc-shapes">
      <div class="arc arc-1"></div>
      <div class="arc arc-2"></div>
      <div class="arc arc-3"></div>
    </div>
    <div class="lines-overlay">
      <div class="line"></div><div class="line"></div><div class="line"></div>
      <div class="line"></div><div class="line"></div><div class="line"></div>
    </div>
    <div class="orb-container" aria-hidden="true">
      <div class="orb orb-1"></div><div class="orb orb-2"></div>
      <div class="orb orb-3"></div><div class="orb orb-4"></div><div class="orb orb-5"></div>
    </div>
    <div class="left-brand">© 2025 InterEQ</div>
  </div>

  <!-- RIGHT LOGIN PANEL -->
  <div class="right-panel">
    <div class="logo-wrap">
      <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="logo-text">InterEQ</div>
    </div>

    <p class="form-section-label">Sign in</p>

    <div class="alert" id="alertBanner" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <input id="emailInput" class="form-input" type="email" name="email"
               placeholder="someone@example.com" autocomplete="email" aria-label="Email address"/>
        <div class="error-msg" id="emailError">Please enter a valid email address.</div>
      </div>

      <div class="form-group password-wrapper">
        <input id="passwordInput" class="form-input" type="password" name="password"
               placeholder="Password" autocomplete="current-password" aria-label="Password"/>
        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <div class="error-msg" id="passwordError">Password cannot be empty.</div>
      </div>

      <div>
        <button type="submit" class="btn-primary" id="signinBtn">Sign in</button>
      </div>

      <a href="#" class="forgot-link" id="forgotLink">Forgot Password</a>
    </form>

    <div class="spacer"></div>

    <footer class="page-footer">
      <span>© 2025 InterEQ</span>
      <a href="#">www.intereq.com</a>
      <a href="#">Privacy Policy</a>
    </footer>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  const form        = document.getElementById('loginForm');
  const emailInput  = document.getElementById('emailInput');
  const passInput   = document.getElementById('passwordInput');
  const emailError  = document.getElementById('emailError');
  const passError   = document.getElementById('passwordError');
  const signinBtn   = document.getElementById('signinBtn');
  const alertBanner = document.getElementById('alertBanner');

  emailInput.addEventListener('input', () => clearFieldError(emailInput, emailError));
  passInput.addEventListener('input',  () => clearFieldError(passInput, passError));

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBanner.className = 'alert';

    let valid = true;
    if (!isValidEmail(emailInput.value)) {
      showFieldError(emailInput, emailError, 'Please enter a valid email address.'); valid = false;
    }
    if (!passInput.value) {
      showFieldError(passInput, passError, 'Password cannot be empty.'); valid = false;
    }
    if (!valid) return;

    signinBtn.classList.add('loading');
    signinBtn.textContent = 'Signing in…';

    try {
      // When backend is live: const data = await apiCall('/login', { email: emailInput.value, password: passInput.value });
      // Demo: simulate success and redirect to MFA page
      await new Promise(r => setTimeout(r, 1200));
      window.location.href = 'mfa.html';
    } catch (err) {
      alertBanner.textContent = 'Unable to connect. Please try again.';
      alertBanner.className = 'alert error';
      signinBtn.classList.remove('loading');
      signinBtn.textContent = 'Sign in';
    }
  });

  document.getElementById('forgotLink').addEventListener('click', (e) => {
    e.preventDefault();
    alertBanner.textContent = 'Password reset link sent to your email.';
    alertBanner.className = 'alert info';
  });
</script>
</body>
</html>
