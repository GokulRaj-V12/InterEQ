        <label class="col-item"><input type="checkbox" checked data-testid="col-offer-id" /> Offer ID</label>

    <!-- MAIN CONTENT -->

      <div id="report-table-wrap">

          <thead id="report-thead">
            <!-- columns built dynamically from CSV header row -->
          </thead>
          <tbody id="report-tbody" data-testid="report-tbody">

  <!-- REPORT FOOTER -->
  <div id="report-footer" role="contentinfo">

  </footer>

  <script src="js/portal.js"></script>
  <script>
    requireAuth();
    initNav('reports');

    var allRows = [];
    var csvHeaders = [];

    // Robust CSV parser — handles quoted fields containing commas/newlines
    function parseCSV(text) {
      var rows = [];
      var lines = text.split(/\r?\n/);
      for (var i = 0; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        rows.push(splitCSVLine(lines[i]));
      }
      return rows;
    }

    function splitCSVLine(line) {
      var result = [];
      var cur = '';
      var inQuotes = false;
      for (var i = 0; i < line.length; i++) {
        var c = line[i];
        if (c === '"') {
          if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (c === ',' && !inQuotes) {
          result.push(cur.trim()); cur = '';
        } else {
          cur += c;
        }
      }
      result.push(cur.trim());
      return result;
    }

    function makeRow(row, i) {
      var tr = document.createElement('tr');
      tr.setAttribute('data-testid', 'row-' + i);
      var cells = '';
      for (var j = 0; j < row.length; j++) {
        cells += '<td>' + (row[j] || '') + '</td>';
      }
      tr.innerHTML = cells;
      return tr;
    }

    function buildHeader(headers) {
      var thead = document.getElementById('report-thead');
      var tr = document.createElement('tr');
      for (var j = 0; j < headers.length; j++) {
        var th = document.createElement('th');
        th.textContent = headers[j];
        tr.appendChild(th);
      }
      thead.innerHTML = '';
      thead.appendChild(tr);
      // Update colspan on loading row
      var loadTd = document.querySelector('#report-tbody td');
      if (loadTd) loadTd.setAttribute('colspan', headers.length);
    }

    function loadReport() {
      var tbody = document.getElementById('report-tbody');
      tbody.innerHTML = '<tr><td colspan="20" style="text-align:center;padding:20px;color:#999;">Loading data\u2026</td></tr>';
      fetch('data/TBA.csv?t=' + new Date().getTime())
        .then(function(r) {
          if (!r.ok) throw new Error('CSV not found');
          return r.text();
        })
        .then(function(text) {
          var rows = parseCSV(text);
          if (rows.length < 2) throw new Error('Empty CSV');
          csvHeaders = rows[0];
          allRows = rows.slice(1);
          buildHeader(csvHeaders);
          renderPage(allRows, 1, tbody, makeRow, 'pagination-controls', 'results-counter');
        })
        .catch(function(err) {
          tbody.innerHTML = '<tr><td colspan="20" style="text-align:center;color:#cc0000;">Could not load TBA.csv — ' + err.message + '.<br>Place your CSV file at <strong>data/TBA.csv</strong> and refresh.</td></tr>';
        });
    }

    document.getElementById('btn-run-report').addEventListener('click', loadReport);
    loadReport();

    // Export button — downloads full dataset as CSV
    document.querySelector('[data-testid="action-export"]').addEventListener('click', function(e) {
      e.preventDefault();
      exportCSV(csvHeaders, allRows, 'LSA_Campaigns_Performance.csv');
    });
  </script>
</body>
</html>
